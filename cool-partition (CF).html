<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cool Partition Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f5f0;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 30px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 { font-size: 20px; font-weight: 800; color: #1a1a1a; margin-bottom: 24px; text-align:center; }

  .input-card {
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 12px;
    padding: 16px 20px;
    width: 100%;
    max-width: 580px;
    margin-bottom: 18px;
  }
  .input-card label { font-size: 11px; color: #888; letter-spacing: 1px; display: block; margin-bottom: 8px; }
  .input-row { display: flex; gap: 8px; }
  input[type=text] {
    flex: 1; padding: 8px 12px; border-radius: 8px;
    border: 1.5px solid #ddd; font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: #1a1a1a; background: #fafaf8; outline: none;
  }
  input[type=text]:focus { border-color: #4a90d9; }
  button.run {
    padding: 8px 20px; border-radius: 8px; border: none;
    background: #2c2c2c; color: #fff; font-family: 'JetBrains Mono', monospace;
    font-weight: 800; font-size: 13px; cursor: pointer;
  }
  button.run:hover { background: #444; }

  #vis { display: none; width: 100%; max-width: 580px; }

  /* ---- ARRAY ROW with partition dividers ---- */
  .array-section {
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 12px;
    padding: 16px 14px 18px;
    margin-bottom: 14px;
    overflow-x: auto;
  }
  .array-section-title { font-size: 11px; color: #888; letter-spacing: 1px; margin-bottom: 14px; }

  .array-outer {
    display: flex;
    align-items: flex-end;
    gap: 0;
    flex-wrap: nowrap;
    justify-content: center;
  }

  .cell-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* pointer triangle below index */
  .pointer {
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 8px solid #e07b00;
    margin-bottom: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .pointer.visible { opacity: 1; }

  .cell-idx { font-size: 10px; color: #bbb; margin-bottom: 3px; }

  .cell-val {
    width: 40px; height: 40px; border-radius: 8px;
    border: 2px solid #ddd; background: #f0ece4;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #1a1a1a;
    transition: background 0.3s, border-color 0.3s, transform 0.25s, box-shadow 0.25s;
  }
  .cell-val.current {
    background: #ffe066; border-color: #e6a800;
    transform: scale(1.15);
    box-shadow: 0 0 0 3px #ffe06655;
  }
  .cell-val.in-mp { background: #ffd6a5; border-color: #e07b00; }
  .cell-val.in-cur { background: #b5d8f7; border-color: #2a7ec8; }
  .cell-val.done-seg { background: #d4f5e2; border-color: #22a855; }

  /* partition divider */
  .divider {
    width: 4px;
    height: 40px;
    background: #22a855;
    border-radius: 3px;
    margin: 0 2px;
    align-self: center;
    box-shadow: 0 0 6px #22a85588;
    /* animate in */
    transform: scaleY(0);
    transform-origin: center;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  .divider.show { transform: scaleY(1); }

  /* ---- Action message ---- */
  .action-msg {
    text-align: center; padding: 10px 16px; border-radius: 10px;
    border: 1.5px solid #ddd; background: #fff;
    font-size: 13px; font-weight: 600; color: #333;
    margin-bottom: 14px; transition: all 0.3s;
    min-height: 42px; display: flex; align-items: center; justify-content: center;
  }
  .msg-init   { border-color: #e07b00; color: #e07b00; background: #fff8ee; }
  .msg-add    { border-color: #2a7ec8; color: #2a7ec8; background: #eef6ff; }
  .msg-erase  { border-color: #d95a5a; color: #d95a5a; background: #fff0f0; }
  .msg-reset  { border-color: #22a855; color: #22a855; background: #edfff4; }
  .msg-mp-update { border-color: #9b5de5; color: #9b5de5; background: #f8f0ff; }
  .msg-cur-clear { border-color: #888; color: #888; background: #f5f5f0; }
  .msg-done   { border-color: #22a855; color: #22a855; background: #edfff4; font-size:15px; }

  /* ---- Buckets ---- */
  .buckets {
    display: grid;
    grid-template-columns: 1fr 72px 1fr;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }
  .bucket {
    border-radius: 12px; padding: 12px 14px; min-height: 90px;
    transition: box-shadow 0.3s;
  }
  .bucket-mp  { background: #fff8ee; border: 2px solid #e07b00; }
  .bucket-cur { background: #eef6ff; border: 2px solid #2a7ec8; }
  .bucket.glow-mp  { box-shadow: 0 0 14px 3px #e07b0044; }
  .bucket.glow-cur { box-shadow: 0 0 14px 3px #2a7ec844; }
  .bucket.glow-reset { box-shadow: 0 0 14px 3px #9b5de544; border-color: #9b5de5; }

  .bucket-title {
    font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
    margin-bottom: 8px; text-transform: uppercase;
  }
  .bucket-mp  .bucket-title { color: #e07b00; }
  .bucket-cur .bucket-title { color: #2a7ec8; }

  .bucket-chips { display: flex; flex-wrap: wrap; gap: 5px; min-height: 30px; }
  .bchip {
    padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 700;
    transition: all 0.3s;
  }
  .bchip-mp  { background: #e07b00; color: #fff; }
  .bchip-cur { background: #2a7ec8; color: #fff; }
  .bchip.entering {
    animation: chipIn 0.4s cubic-bezier(.34,1.56,.64,1) both;
  }
  .bchip.leaving {
    animation: chipOut 0.3s ease-in both;
  }
  @keyframes chipIn {
    from { transform: translateY(-12px) scale(0.7); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes chipOut {
    from { transform: scale(1); opacity: 1; }
    to   { transform: scale(0.5); opacity: 0; }
  }
  .bucket-empty { font-size: 12px; color: #ccc; font-style: italic; }

  /* count */
  .cnt-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cnt-label { font-size: 10px; color: #888; letter-spacing: 1px; }
  .cnt-num {
    width: 50px; height: 50px; border-radius: 50%;
    border: 3px solid #22a855; background: #edfff4;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; color: #22a855;
    transition: all 0.35s;
  }
  .cnt-num.bump {
    background: #c5f2d5;
    box-shadow: 0 0 0 6px #22a85530;
    animation: cntBump 0.5s ease;
  }
  @keyframes cntBump {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ---- Segments formed ---- */
  .seg-section {
    background: #fff; border: 1.5px solid #ddd; border-radius: 12px;
    padding: 12px 14px; margin-bottom: 14px;
  }
  .seg-section-title { font-size: 11px; color: #888; letter-spacing: 1px; margin-bottom: 10px; }
  .seg-parts { display: flex; flex-wrap: wrap; gap: 8px; }
  .seg-part {
    display: flex; gap: 3px; align-items: center;
    padding: 6px 10px; border-radius: 8px; border: 2px solid #ccc; background: #fafaf8;
    animation: segAppear 0.4s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes segAppear {
    from { transform: scale(0.8) translateY(6px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .seg-part-label { font-size: 10px; margin-right: 4px; font-weight: 800; }
  .seg-num { font-size: 14px; font-weight: 700; color: #1a1a1a; margin: 0 1px; }

  /* ---- Controls ---- */
  .controls {
    display: flex; gap: 8px; justify-content: center;
    align-items: center; margin-bottom: 10px; flex-wrap: wrap;
  }
  button.nav {
    padding: 7px 16px; border-radius: 8px; border: 1.5px solid #ddd;
    background: #fff; color: #333; font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 13px; cursor: pointer;
  }
  button.nav:disabled { opacity: 0.35; cursor: not-allowed; }
  button.nav:not(:disabled):hover { background: #f0f0ec; }
  button.play-btn {
    padding: 7px 20px; border-radius: 8px; border: none;
    background: #2c2c2c; color: #fff; font-family: 'JetBrains Mono', monospace;
    font-weight: 800; font-size: 13px; cursor: pointer; min-width: 88px;
  }
  .speed-row { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #888; }

  .step-info { text-align: center; font-size: 11px; color: #aaa; margin-bottom: 8px; }
  .prog-bar { height: 4px; background: #e8e8e8; border-radius: 4px; margin-bottom: 14px; overflow: hidden; }
  .prog-fill { height: 100%; background: #2c2c2c; border-radius: 4px; transition: width 0.3s; }

  .seg-colors-legend {
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
    font-size: 11px; color: #888; margin-top: 6px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .ldot { width: 10px; height: 10px; border-radius: 3px; }
</style>
</head>
<body>

<h1>Cool Partition</h1>

<div class="input-card">
  <label>ARRAY INPUT (space-separated)</label>
  <div class="input-row">
    <input type="text" id="arrInput" value="1 2 1 3 2 1 3 2" placeholder="e.g. 1 2 1 3 2 1 3 2"/>
    <button class="run" onclick="startViz()">RUN</button>
  </div>
</div>

<div id="vis">

  <div class="array-section">
    <div class="array-section-title" id="arrLabel">ARRAY</div>
    <div class="array-outer" id="arrayOuter"></div>
  </div>

  <div class="action-msg" id="actionMsg">—</div>

  <div class="buckets">
    <div class="bucket bucket-mp" id="bucketMp">
      <div class="bucket-title">checklist (next seg needs these)</div>
      <div class="bucket-chips" id="mpChips"></div>
    </div>
    <div class="cnt-box">
      <div class="cnt-label">SEGS</div>
      <div class="cnt-num" id="cntNum">1</div>
    </div>
    <div class="bucket bucket-cur" id="bucketCur">
      <div class="bucket-title">collected (seen in this seg)</div>
      <div class="bucket-chips" id="curChips"></div>
    </div>
  </div>

  <div class="seg-section" id="segSection" style="display:none">
    <div class="seg-section-title">SEGMENTS FORMED</div>
    <div class="seg-parts" id="segParts"></div>
  </div>

  <div class="controls">
    <button class="nav" id="btnPrev" onclick="goPrev()">← Prev</button>
    <button class="play-btn" id="btnPlay" onclick="togglePlay()">▶ Play</button>
    <button class="nav" id="btnNext" onclick="goNext()">Next →</button>
    <div class="speed-row">
      Slow
      <input type="range" min="1" max="10" step="1" value="5" id="speedSlider" style="width:70px"/>
      Fast
    </div>
  </div>

  <div class="step-info" id="stepInfo">Step 1 / 1</div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div class="seg-colors-legend">
    <div class="legend-item"><span class="ldot" style="background:#ffe066;border:2px solid #e6a800"></span>current</div>
    <div class="legend-item"><span class="ldot" style="background:#ffd6a5;border:2px solid #e07b00"></span>in mp</div>
    <div class="legend-item"><span class="ldot" style="background:#b5d8f7;border:2px solid #2a7ec8"></span>in cur</div>
    <div class="legend-item"><span class="ldot" style="background:#d4f5e2;border:2px solid #22a855"></span>segment done</div>
    <div class="legend-item"><span style="display:inline-block;width:6px;height:14px;background:#22a855;border-radius:2px;"></span>partition boundary</div>
  </div>

</div>

<script>
let steps = [], stepIdx = 0, playing = false, timer = null;
let globalArr = [];
const SEG_COLORS = ['#e07b00','#2a7ec8','#22a855','#9b5de5','#e63946','#f4a261','#457b9d'];

function parseArr(s) {
  return s.trim().split(/\s+/).map(Number).filter(n => !isNaN(n));
}

// Step types:
// init, add, erase, partition (divider appears), mp-update, cur-clear, done
function buildSteps(arr) {
  const n = arr.length, st = [];
  let mp = {}, cur = {}, cnt = 1;
  let partitions = []; // array of {start, end}
  let segStart = 0;

  mp[arr[0]] = 1;
  st.push({ mp:{...mp}, cur:{...cur}, cnt, cidx:0, type:'init',
    msg:`Start segment 1. Add a[0]=${arr[0]} to checklist.`,
    partitions:[...partitions] });

  for (let i = 1; i < n; i++) {
    const v = arr[i];
    cur[v] = 1;
    st.push({ mp:{...mp}, cur:{...cur}, cnt, cidx:i, type:'add',
      msg:`a[${i}]=${v} → enters collected bucket`, hi:v,
      partitions:[...partitions] });

    if (mp[v] !== undefined) {
      delete mp[v];
      st.push({ mp:{...mp}, cur:{...cur}, cnt, cidx:i, type:'erase',
        msg:`${v} found in checklist → erase it (constraint satisfied)`, hi:v,
        partitions:[...partitions] });
    }

    if (Object.keys(mp).length === 0) {
      // Step 1: show partition divider
      partitions.push({ start: segStart, end: i });
      st.push({ mp:{...mp}, cur:{...cur}, cnt, cidx:i, type:'partition',
        msg:`mp is empty! All elements satisfied → partition here ✂`,
        partitions:[...partitions] });

      // Step 2: mp = cur  
      cnt++;
      mp = {...cur};
      st.push({ mp:{...mp}, cur:{...cur}, cnt, cidx:i, type:'mp-update',
        msg:`checklist = collected. New segment ${cnt} starts.`,
        partitions:[...partitions] });

      // Step 3: cur clears
      cur = {};
      segStart = i + 1;
      st.push({ mp:{...mp}, cur:{...cur}, cnt, cidx:i, type:'cur-clear',
        msg:`collected clears itself. Ready for next segment.`,
        partitions:[...partitions] });
    }
  }

  partitions.push({ start: segStart, end: n - 1 });
  st.push({ mp:{...mp}, cur:{...cur}, cnt, cidx:-1, type:'done',
    msg:`✅ Done! Maximum segments = ${cnt}`,
    partitions:[...partitions] });
  return st;
}

function renderChips(id, cls, keys, hiKey, animate) {
  const el = document.getElementById(id);
  const prev = new Set([...el.querySelectorAll('.bchip')].map(c => c.dataset.val));
  const next = new Set(keys.map(String));

  if (!animate) {
    el.innerHTML = '';
    if (keys.length === 0) { el.innerHTML = '<span class="bucket-empty">empty</span>'; return; }
    keys.forEach(v => {
      const c = document.createElement('span');
      c.className = `bchip bchip-${cls}`;
      c.dataset.val = v;
      c.textContent = v;
      el.appendChild(c);
    });
    return;
  }

  // Remove chips that left
  el.querySelectorAll('.bchip').forEach(c => {
    if (!next.has(c.dataset.val)) {
      c.classList.add('leaving');
      setTimeout(() => c.remove(), 280);
    }
  });

  // Add new chips
  keys.forEach(v => {
    if (!prev.has(String(v))) {
      const c = document.createElement('span');
      c.className = `bchip bchip-${cls} entering`;
      c.dataset.val = v;
      c.textContent = v;
      el.appendChild(c);
    }
  });

  if (keys.length === 0) {
    setTimeout(() => {
      if (el.querySelector('.bchip') === null)
        el.innerHTML = '<span class="bucket-empty">empty</span>';
    }, 320);
  } else {
    const emp = el.querySelector('.bucket-empty');
    if (emp) emp.remove();
  }
}

function renderStep(animate) {
  const s = steps[stepIdx];
  const arr = globalArr;

  // ---- Array + dividers ----
  const outer = document.getElementById('arrayOuter');
  outer.innerHTML = '';

  // figure out which indices are partition END positions
  const divAfter = new Set(s.partitions.map(p => p.end));
  // which segments are complete (not the last partial)
  const doneIndices = new Set();
  s.partitions.forEach(p => {
    for (let x = p.start; x <= p.end; x++) doneIndices.add(x);
  });
  // last partition's end is array end for 'done'
  const lastPart = s.partitions[s.partitions.length - 1];

  arr.forEach((v, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'cell-wrap';

    // pointer
    const ptr = document.createElement('div');
    ptr.className = 'pointer' + (i === s.cidx ? ' visible' : '');
    wrap.appendChild(ptr);

    const idx = document.createElement('div');
    idx.className = 'cell-idx';
    idx.textContent = i;
    wrap.appendChild(idx);

    const val = document.createElement('div');
    val.className = 'cell-val';
    if (i === s.cidx) {
      val.classList.add('current');
    } else if (doneIndices.has(i) && !(lastPart && i >= lastPart.start && s.type !== 'done')) {
      val.classList.add('done-seg');
    } else if (s.mp[v] !== undefined) {
      val.classList.add('in-mp');
    } else if (s.cur[v] !== undefined) {
      val.classList.add('in-cur');
    }
    val.textContent = v;
    wrap.appendChild(val);
    outer.appendChild(wrap);

    // divider after this cell?
    if (divAfter.has(i) && i < arr.length - 1) {
      const div = document.createElement('div');
      div.className = 'divider';
      outer.appendChild(div);
      // trigger show on next frame
      requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('show')));
    }
  });

  // ---- Buckets ----
  const mpKeys = Object.keys(s.mp).map(Number);
  const curKeys = Object.keys(s.cur).map(Number);

  const bmp = document.getElementById('bucketMp');
  const bcur = document.getElementById('bucketCur');
  bmp.className = 'bucket bucket-mp';
  bcur.className = 'bucket bucket-cur';

  if (s.type === 'add')       bcur.classList.add('glow-cur');
  if (s.type === 'erase')     bmp.classList.add('glow-mp');
  if (s.type === 'mp-update') bmp.classList.add('glow-reset');
  if (s.type === 'cur-clear') bcur.classList.add('glow-reset');

  renderChips('mpChips',  'mp',  mpKeys,  s.type === 'erase' ? s.hi : null, !!animate);
  renderChips('curChips', 'cur', curKeys, s.type === 'add'   ? s.hi : null, !!animate);

  // ---- Count ----
  const cn = document.getElementById('cntNum');
  cn.textContent = s.cnt;
  cn.className = 'cnt-num' + (s.type === 'mp-update' ? ' bump' : '');

  // ---- Message ----
  const am = document.getElementById('actionMsg');
  const cls = { init:'msg-init', add:'msg-add', erase:'msg-erase',
    partition:'msg-reset', 'mp-update':'msg-mp-update', 'cur-clear':'msg-cur-clear', done:'msg-done' };
  am.textContent = s.msg;
  am.className = 'action-msg ' + (cls[s.type] || '');

  // ---- Segments formed ----
  const ss = document.getElementById('segSection');
  const sp = document.getElementById('segParts');
  if (s.partitions.length > 0) {
    ss.style.display = 'block';
    // only re-render if count changed (avoid re-animation)
    if (sp.children.length !== s.partitions.length) {
      sp.innerHTML = '';
      s.partitions.forEach((p, si) => {
        const color = SEG_COLORS[si % SEG_COLORS.length];
        const part = document.createElement('div');
        part.className = 'seg-part';
        part.style.borderColor = color;
        const lbl = document.createElement('span');
        lbl.className = 'seg-part-label';
        lbl.style.color = color;
        lbl.textContent = `b${si+1}`;
        part.appendChild(lbl);
        arr.slice(p.start, p.end + 1).forEach(v => {
          const vv = document.createElement('span');
          vv.className = 'seg-num';
          vv.textContent = v;
          part.appendChild(vv);
        });
        sp.appendChild(part);
      });
    }
  } else {
    ss.style.display = 'none';
  }

  // ---- Progress ----
  document.getElementById('progFill').style.width = `${((stepIdx+1)/steps.length)*100}%`;
  document.getElementById('stepInfo').textContent = `Step ${stepIdx+1} / ${steps.length}`;
  document.getElementById('btnPrev').disabled = stepIdx === 0;
  document.getElementById('btnNext').disabled = stepIdx >= steps.length - 1;
}

function startViz() {
  globalArr = parseArr(document.getElementById('arrInput').value);
  if (globalArr.length < 1) { alert('Enter at least 1 number.'); return; }
  stopPlay();
  steps = buildSteps(globalArr);
  stepIdx = 0;
  document.getElementById('vis').style.display = 'block';
  document.getElementById('arrLabel').textContent = `ARRAY  (n = ${globalArr.length})`;
  document.getElementById('segParts').innerHTML = '';
  renderStep(false);
}

function getSpeed() {
  // slider 1=slow(1400ms) to 10=fast(150ms)
  const v = parseInt(document.getElementById('speedSlider').value);
  return Math.round(1400 - (v - 1) * (1250 / 9));
}

function goNext() {
  if (stepIdx < steps.length - 1) { stepIdx++; renderStep(true); }
  if (stepIdx >= steps.length - 1) stopPlay();
}
function goPrev() { if (stepIdx > 0) { stepIdx--; renderStep(false); } }
function togglePlay() { playing ? stopPlay() : startPlay(); }
function startPlay() {
  playing = true;
  document.getElementById('btnPlay').textContent = '⏸ Pause';
  tick();
}
function stopPlay() {
  playing = false;
  document.getElementById('btnPlay').textContent = '▶ Play';
  clearTimeout(timer);
}
function tick() {
  if (!playing) return;
  if (stepIdx >= steps.length - 1) { stopPlay(); return; }
  stepIdx++; renderStep(true);
  timer = setTimeout(tick, getSpeed());
}
</script>
</body>
</html>
